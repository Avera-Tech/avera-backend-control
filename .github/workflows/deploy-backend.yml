name: Deploy Backend (production)

on:
  push:
    branches: [master]

jobs:
  backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'
            if [ ! -d "/www/wwwroot/backend-control/.git" ]; then
              rm -rf /www/wwwroot/backend-control
              git clone git@github.com:Avera-Tech/avera-backend-control.git /www/wwwroot/backend-control
            fi
            cd /www/wwwroot/backend-control
            git pull origin master
            {
              echo 'NODE_ENV=production'
              echo 'PORT=${{ secrets.PORT }}'
              echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}'
              echo 'JWT_EXPIRES_IN=24h'
              echo 'JWT_REFRESH_EXPIRES_IN=7d'
              echo 'DB_CORE_HOST=localhost'
              echo 'DB_CORE_NAME=${{ secrets.DB_CORE_NAME }}'
              echo 'DB_CORE_USER=${{ secrets.DB_CORE_USER }}'
              echo 'DB_CORE_PASS=${{ secrets.DB_CORE_PASS }}'
              echo 'DB_MASTER_HOST=localhost'
              echo 'DB_MASTER_NAME=${{ secrets.DB_MASTER_NAME }}'
              echo 'DB_MASTER_USER=${{ secrets.DB_MASTER_USER }}'
              echo 'DB_MASTER_PASS=${{ secrets.DB_MASTER_PASS }}'
              echo 'BCRYPT_ROUNDS=10'
              echo 'RATE_LIMIT_WINDOW_MS=900000'
              echo 'RATE_LIMIT_MAX_REQUESTS=100'
              echo 'LOG_LEVEL=info'
              echo 'EMAIL_HOST=smtp.hostinger.com'
              echo 'EMAIL_PORT=587'
              echo 'EMAIL_USER=${{ secrets.EMAIL_USER }}'
              echo 'EMAIL_PASS=${{ secrets.EMAIL_PASS }}'
              echo 'EMAIL_FROM_NAME=Avera'
              echo 'FRONTEND_RESET_URL=https://admin.averafit.app/reset-password?token='
              echo 'SYNC_SECRET_KEY=${{ secrets.SYNC_SECRET_KEY }}'
              echo 'DB_PASSWORD_SECRET=${{ secrets.DB_PASSWORD_SECRET }}'
              echo 'PAGARME_SECRET_KEY=${{ secrets.PAGARME_SECRET_KEY }}'
            } > .env
            npm install
            npm run build
            su -s /bin/bash www -c "cd /www/wwwroot/backend-control && pm2 startOrReload ecosystem.config.js --env production && pm2 save"
          EOF
