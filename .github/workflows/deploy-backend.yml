name: Deploy Backend (production)

on:
  push:
    branches: [master]

jobs:
  backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'
            if [ ! -d "/www/wwwroot/backend-control/.git" ]; then
              rm -rf /www/wwwroot/backend-control
              git clone git@github.com:Avera-Tech/avera-backend-control.git /www/wwwroot/backend-control
            fi
            cd /www/wwwroot/backend-control
            git pull origin master
            {
              echo "NODE_ENV=production"
              echo "PORT=3000"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "DB_CORE_HOST=localhost"
              echo "DB_CORE_NAME=core_db"
              echo "DB_CORE_USER=${{ secrets.DB_USER }}"
              echo "DB_CORE_PASS=${{ secrets.DB_PASS }}"
              echo "DB_MASTER_HOST=localhost"
              echo "DB_MASTER_NAME=master_db"
              echo "DB_MASTER_USER=${{ secrets.DB_USER }}"
              echo "DB_MASTER_PASS=${{ secrets.DB_PASS }}"
            } > .env
            npm install
            npm run build
            PORT=3000 NODE_ENV=production pm2 restart avera-backend-prod --update-env || \
              PORT=3000 NODE_ENV=production pm2 start dist/index.js --name avera-backend-prod
            pm2 save
          EOF
