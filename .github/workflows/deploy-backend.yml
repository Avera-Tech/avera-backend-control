name: Deploy Backend (production)

on:
  push:
    branches: [master]

jobs:
  backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Criar .env remoto
        run: |
          ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} "cat <<EOF > /www/wwwroot/backend-control/.env
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_CORE_HOST=localhost
            DB_CORE_NAME=core_db
            DB_CORE_USER=${{ secrets.DB_USER }}
            DB_CORE_PASS=${{ secrets.DB_PASS }}
            DB_MASTER_HOST=localhost
            DB_MASTER_NAME=master_db
            DB_MASTER_USER=${{ secrets.DB_USER }}
            DB_MASTER_PASS=${{ secrets.DB_PASS }}
          EOF"

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'EOF'
            if [ ! -d "/www/wwwroot/backend-control/.git" ]; then
              git clone git@github.com:Avera-Tech/avera-backend-control.git /www/wwwroot/backend-control
            fi
            cd /www/wwwroot/backend-control
            git pull origin master
            npm install
            npm run build
            PORT=3000 NODE_ENV=production pm2 restart avera-backend-prod --update-env || \
              PORT=3000 NODE_ENV=production pm2 start dist/index.js --name avera-backend-prod
            pm2 save
          EOF
